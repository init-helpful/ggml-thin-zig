name: Auto-Sync and Prune

on:
    schedule:
        - cron: "0 2 * * *" # Runs daily at 2:00 AM UTC
    workflow_dispatch: # Allows manual trigger from the UI

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    sync-and-prune:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout local repository

              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Fetch upstream ggml
              run: |
                  git remote add upstream https://github.com/ggml-org/ggml.git
                  git fetch upstream master

            - name: Restore upstream state and Prune
              run: |
                  # 1. Back up our auto-prune workflow so it survives the sync
                  cp .github/workflows/auto-prune.yml /tmp/auto-prune.yml

                  # 2. Force our working tree and index to exactly mirror upstream master
                  git restore --source=upstream/master --worktree --staged :/

                  # 3. Nuke upstream's GitHub CI actions & PR templates, then restore ours
                  rm -rf .github
                  mkdir -p .github/workflows
                  cp /tmp/auto-prune.yml .github/workflows/auto-prune.yml

                  # 4. Nuke all excess root directories
                  rm -rf ci cmake docs examples python scripts tests

                  # 5. Nuke root-level filler files
                  rm -f .editorconfig .gitignore .gitmodules CONTRIBUTING.md ggml.pc.in requirements.txt

                  # 6. Globally nuke all CMake files
                  find . -name "CMakeLists.txt" -type f -delete
                  find . -name "*.cmake" -type f -delete

                  # 7. Nuke unused backends from src/
                  rm -rf src/ggml-blas src/ggml-cann src/ggml-hexagon src/ggml-hip src/ggml-musa \
                         src/ggml-opencl src/ggml-openvino src/ggml-rpc src/ggml-sycl \
                         src/ggml-virtgpu src/ggml-webgpu src/ggml-zdnn src/ggml-zendnn

                  # 8. Nuke their corresponding headers from include/
                  rm -f include/ggml-blas.h include/ggml-cann.h include/ggml-hexagon.h \
                        include/ggml-opencl.h include/ggml-openvino.h include/ggml-rpc.h \
                        include/ggml-sycl.h include/ggml-virtgpu.h include/ggml-webgpu.h \
                        include/ggml-zdnn.h include/ggml-zendnn.h

                  # Stage all deletions and updates
                  git add -A

            - name: Commit and Push
              run: |
                  UPSTREAM_SHA=$(git rev-parse --short upstream/master)

                  # Check if there are actually any new changes to commit
                  if git diff --staged --quiet; then
                    echo "Already up to date with upstream ($UPSTREAM_SHA). Nothing to commit."
                  else
                    git commit -m "Auto-sync & prune upstream commit $UPSTREAM_SHA"
                    git push origin master
                    echo "Successfully synced and pushed new pruned commit."
                  fi
